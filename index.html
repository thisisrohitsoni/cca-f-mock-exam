<script>
/* ============================================================
   CCA-F MOCK EXAM  —  randomized engine
   Each load draws a fresh weighted sample (16/11/12/12/9 = 60)
   from five domain pools, then shuffles question + option order.
   Content aligned to the published CCA-F blueprint (5 domains,
   7 anti-patterns). Community practice material — not official
   Anthropic exam items.
   ============================================================ */

const DOMAINS = {
  D1:{name:"Agentic Architecture & Orchestration", weight:27},
  D2:{name:"Tool Design & MCP Integration",         weight:18},
  D3:{name:"Claude Code Configuration & Workflows", weight:20},
  D4:{name:"Prompt Engineering & Structured Output",weight:20},
  D5:{name:"Context Management & Reliability",       weight:15},
};
// questions drawn per domain each sitting -> 16+11+12+12+9 = 60
const DRAW = { D1:16, D2:11, D3:12, D4:12, D5:9 };

const SCN = {
  S1:{title:"MeridianPay — fintech multi-agent platform",
      body:"MeridianPay runs a coordinator agent that delegates to specialized subagents: document-analysis (regulatory filings), account-lookup, and refund-processing. It is moving from prototype to production under strict reliability and audit requirements."},
  S2:{title:"HelixCare — patient triage agent",
      body:"HelixCare deploys a Claude-based triage agent that answers patient questions and books appointments. Compliance mandates strict, predictable escalation to human clinicians."},
  S3:{title:"CodeForge — Claude Code in CI/CD",
      body:"CodeForge, a 40-engineer org, has standardized on Claude Code. They want consistent team behavior plus automated PR review and test generation in CI, while keeping changes safe in a large shared codebase."},

D1:[
 {t:"single",w:2,q:"You implement the core agentic loop. After each API response your code must decide whether to execute a tool and continue, or stop. What is the correct, production-grade way to decide?",
  o:["Parse Claude's text for phrases like \"task complete.\"","Inspect <code>stop_reason</code>: continue on <code>tool_use</code>, exit on <code>end_turn</code>.","Stop after a fixed cap of 10 iterations regardless of state.","Make a follow-up call asking Claude whether it's finished."],c:[1],
  e:"<code>stop_reason</code> is the deterministic control signal. Parsing natural language is an explicit anti-pattern; an iteration cap is a backstop, not the primary mechanism."},
 {t:"single",w:1,q:"A response returns with <code>stop_reason</code> = <code>max_tokens</code>. How should a robust loop treat this?",
  o:["Treat it like <code>end_turn</code> and return the partial output as final.","Retry the same request unchanged.","Handle it as a distinct edge case — output was truncated — e.g. request a continuation.","Abort the session with a fatal error."],c:[2],
  e:"<code>max_tokens</code> means truncation — neither completion nor a tool request. Handle it explicitly, typically by continuing generation."},
 {t:"single",w:2,s:"S1",q:"MeridianPay's coordinator delegates to specialized subagents. What is the coordinator's correct role in a hub-and-spoke architecture?",
  o:["Do all tool calls itself, using subagents only as fallback.","Route and delegate to subagents and synthesize their results, without doing the specialized work itself.","Share its full conversation context with every subagent.","Hold every tool so it can bypass subagents."],c:[1],
  e:"The hub coordinates — routing, delegation, synthesis — not the specialized work. Sharing full context breaks isolation; holding all tools is the \"all tools to all agents\" anti-pattern."},
 {t:"single",w:2,s:"S1",q:"MeridianPay's refund subagent keeps \"failing to access\" the customer's account tier, though the user stated it earlier to the coordinator. Most likely cause?",
  o:["The subagent's model version is older.","Subagents inherit context lazily and need <code>--resume</code>.","Subagents don't inherit the parent's conversation context; the tier was never explicitly passed.","The coordinator's context overflowed."],c:[2],
  e:"Subagents start clean by design. The fix is to explicitly pass the needed information when invoking the subagent."},
 {t:"single",w:1,q:"Subagent context isolation is a deliberate design choice. Which is NOT a benefit it provides?",
  o:["Prevents context pollution from unrelated threads.","Reduces risk of leaking sensitive info to subagents that don't need it.","Makes each subagent more predictable and easier to debug.","Automatically shares retrieved results across all subagents."],c:[3],
  e:"Isolation reduces pollution, improves security, and aids predictability. It specifically does not auto-share results — that would defeat isolation."},
 {t:"multi",w:2,q:"Your coordinator queries four independent data sources at once with parallel Task calls. Which principles apply?",
  o:["Only parallelize tasks truly independent of one another's outputs.","The coordinator aggregates and (where needed) deduplicates results.","On a task failure, decide retry/skip/fail based on criticality.","Tasks with strict output dependencies should still be parallelized for speed."],c:[0,1,2],
  e:"Parallelize only independent work; aggregate and dedupe; handle failures per criticality. Dependent tasks must run sequentially."},
 {t:"single",w:1,q:"An agent must explore two alternative resolution paths before committing, without polluting the main thread. Which session mechanism fits?",
  o:["<code>--resume</code>, because it preserves history.","<code>fork_session</code>, which copies current history and diverges.","<code>/compact</code>, to summarize before branching.","An isolated subagent with no shared history."],c:[1],
  e:"<code>fork_session</code> copies history and diverges — ideal for \"what-if\" exploration. <code>--resume</code> is for continuing interrupted work."},
 {t:"single",w:1,q:"A long-running agent was interrupted by a host restart mid-task. History should be preserved and work continued exactly where it stopped. Which mechanism?",
  o:["<code>fork_session</code>","<code>--resume</code>","Start fresh and re-paste the transcript.","<code>/compact</code> then restart."],c:[1],
  e:"<code>--resume</code> continues an existing session with history intact — the canonical pattern for resuming interrupted work."},
 {t:"single",w:2,s:"S2",q:"HelixCare needs an agent answering a narrow FAQ set and booking via one scheduling tool. An engineer proposes a five-subagent hub-and-spoke design. Best guidance?",
  o:["Approve it; more agents always improve reliability.","Match architecture to complexity — a single focused agent fits; reserve hub-and-spoke for genuinely multi-specialization tasks.","Use parallel Tasks per FAQ category.","Require sentiment routing between subagents."],c:[1],
  e:"Match complexity to architecture rather than defaulting to the most complex option. A narrow, single-tool task needs a single agent."},
 {t:"single",w:2,q:"Inside an agentic loop, a tool call fails with a transient network error. Recommended handling?",
  o:["Exit the loop and surface a fatal error.","Silently return an empty result so the loop proceeds.","Return the error to Claude as a structured tool result so it can retry, try an alternative, or inform the user.","Permanently strip the failed tool and continue."],c:[2],
  e:"Keep the loop in control: return structured error info as a tool result. Exiting on first failure or silently returning empty are anti-patterns."},
 {t:"single",w:1,q:"You want to control runaway cost in long loops. Which statement best captures correct practice?",
  o:["An iteration cap and a token budget are the same control.","Use <code>stop_reason</code> as primary terminator, an iteration cap as safety net, and a token budget to cap cumulative cost.","Replace <code>stop_reason</code> with a strict 10-iteration cap.","Token budgets are unnecessary if you cap iterations."],c:[1],
  e:"Complementary controls: <code>stop_reason</code> primary, iteration cap as backstop (logs when hit), token budget caps cumulative spend."},
 {t:"single",w:1,q:"When streaming responses in real time, where do you obtain <code>stop_reason</code>?",

 {t:"single",w:2,s:"S1",q:"MeridianPay's volume triples. An engineer wants each subagent \"smarter\" via more tools and longer prompts to absorb load. Better approach?",
  o:["Consolidate everything into one large agent.","Scale throughput via parallelization / more instances while keeping individual agents simple and focused.","Add 15 more tools to the coordinator.","Maximize each subagent's context window."],c:[1],

 {t:"single",w:1,q:"A multi-agent system returns incorrect results. Which is a commonly correct diagnosis?",
  o:["The coordinator should have done all the work itself.","A subagent isn't receiving needed context (isolation violation), the coordinator routes to the wrong subagent (weak descriptions), or the loop isn't checking <code>stop_reason</code>.","Temperature is too low.","<code>stop_reason</code> allowed too few iterations."],c:[1],

 {t:"single",w:1,q:"Which best distinguishes when to choose an agentic architecture over a fixed workflow?",
  o:["Always choose agents; workflows are deprecated.","Use an agent when the task needs dynamic tool use and variable action sequences; use a workflow when steps are fixed.","Use agents only for single-turn calls.","Workflows are for production; agents only for demos."],c:[1],
  e:"Agentic patterns suit autonomy and variable action loops; deterministic fixed-step tasks suit simpler workflows."},
 {t:"single",w:2,s:"S2",q:"HelixCare must verify insurance and summarize prior visit notes, then combine both. The two don't depend on each other. Most efficient correct design?",
  o:["Run them sequentially because medical tasks must be ordered.","Launch them as parallel Tasks, then have the coordinator aggregate both.","Merge both into a single 20-tool agent.","Use <code>fork_session</code> to run each, discarding one branch."],c:[1],

 {t:"single",w:1,q:"A single response contains two <code>tool_use</code> blocks. Correct handling?",

 {t:"single",w:1,q:"When returning a tool result to Claude, what links it to the originating request?",

 {t:"single",w:2,s:"S5",q:"Atlas must handle \"reroute all delayed shipments in a region,\" decomposing into a number of subtasks not known in advance. Which pattern fits?",

 {t:"single",w:1,q:"Which describes the prompt-chaining workflow?",

 {t:"single",w:1,q:"A support system must send billing questions to one path and technical questions to another. Which workflow pattern?",

 {t:"single",w:1,q:"One call generates a draft and another critiques and requests revisions in a loop until criteria are met. Pattern?",

 {t:"single",w:2,q:"For a task a single well-prompted call handles reliably, a team builds a four-agent orchestrator. Guidance?",

 {t:"single",w:1,q:"What should you give a subagent when delegating?",

 {t:"multi",w:2,q:"Select all that contribute to a coordinator routing to the wrong subagent.",

 {t:"single",w:1,q:"Task B needs Task A's output. How should they run?",

 {t:"single",w:2,s:"S1",q:"MeridianPay wants a backstop so a malfunctioning loop can't run forever. Best practice?",

 {t:"single",w:1,q:"A tool that charges a card is retried after a network error. What prevents a double charge?",

 {t:"single",w:1,q:"Where should durable task state (e.g., collected fields) live across a multi-turn interaction?",

 {t:"single",w:1,q:"What best justifies introducing a new specialized subagent?",

 {t:"single",w:1,q:"<code>stop_reason</code> = <code>end_turn</code> indicates…",

 {t:"single",w:2,s:"S2",q:"When HelixCare's agent escalates to a human, what should it pass along?",

 {t:"single",w:1,q:"After parallel Tasks complete, results may arrive out of order. The coordinator should…",

 {t:"single",w:1,q:"In a single agent with several tools, what is the primary mechanism Claude uses to decide which tool to call?",

 {t:"single",w:1,q:"What does CCA-F guidance say about the number of tools per agent?",
  o:["Unlimited; Claude handles any count equally.","4–5 tools is optimal; routing accuracy degrades significantly above ~18 tools.","Exactly 10 maximizes accuracy.","Fewer than 3 is always required."],c:[1],

 {t:"single",w:2,s:"S1",q:"After MeridianPay adds many new tools to one agent, Claude increasingly calls the wrong tool. Best fix?",
  o:["Rewrite the descriptions and keep the count.","Lower the temperature.","Restructure into hub-and-spoke with specialized subagents, each holding a focused 4–5 tool set.","Set <code>tool_choice: any</code>."],c:[2],

 {t:"single",w:1,q:"Which <code>tool_choice</code> forces a tool call while letting Claude choose which?",

 {t:"single",w:1,q:"You want a synthesis step where tool use is inappropriate and only text is desired. Which <code>tool_choice</code>?",

 {t:"single",w:1,q:"Which file configures MCP servers shared with everyone on a project and is committed to version control?",
  o:["<code>~/.claude.json</code> (user-level)","<code>.mcp.json</code> in the project root (project-level)","<code>~/.claude/CLAUDE.md</code>","<code>.claude/skills/</code>"],c:[1],

 {t:"single",w:2,q:"An MCP-based tool works for one developer but not their teammates. Most likely cause and fix?",
  o:["The teammates need newer hardware.","The working dev has it in user-level <code>~/.claude.json</code>; the shared <code>.mcp.json</code> is missing/misconfigured — add the shared config to the project's <code>.mcp.json</code>.","MCP requires per-user license keys.","Switch from stdio to SSE."],c:[1],
  e:"A scoping bug — servers the whole team needs belong in project-level <code>.mcp.json</code>, not one person's user config."},
 {t:"single",w:2,q:"How should credentials be supplied to an MCP server defined in <code>.mcp.json</code>?",
  o:["Hardcode the token in <code>.mcp.json</code>.","Reference an env var via <code>${GITHUB_TOKEN}</code> so secrets aren't committed.","Put the token in a comment.","Pass it as a literal in the tool description."],c:[1],

 {t:"single",w:2,q:"A search tool hits an auth timeout. What must it return so Claude responds correctly?",
  o:["An empty result array so the loop proceeds.","A structured error distinguishing access failure (type + <code>isRetryable</code> + context) from a genuine empty result.","The string \"error\" with no metadata.","A fabricated best-guess result."],c:[1],

 {t:"multi",w:1,q:"A well-designed structured tool error should include which of the following?",

 {t:"single",w:1,q:"For a structured-extraction step where you programmatically know exactly which tool must run, which <code>tool_choice</code>?",

 {t:"single",w:1,q:"Two tools have similar descriptions and Claude picks inconsistently. Best fix?",

  e:"Disambiguate by making each description state its distinct purpose and conditions for use."},
 {t:"single",w:1,q:"A tool only supports US addresses but its description doesn't say so. Risk?",

 {t:"single",w:2,s:"S5",q:"Atlas's single dispatch agent now exposes 22 tools and routing accuracy drops. Best response?",

 {t:"single",w:1,q:"A tool's input JSON schema primarily…",
  o:["Guarantees semantic correctness of arguments.","Constrains the structure/types of arguments Claude must provide.","Routes between tools.","Stores secrets."],c:[1],
  e:"Input schemas shape argument structure; they don't guarantee the values are semantically valid."},
 {t:"single",w:1,q:"An MCP server only you use across all your projects belongs in…",
  o:["The project <code>.mcp.json</code>.","Your user-level <code>~/.claude.json</code>.","A rules file.","The tool description."],c:[1],
  e:"Personal, cross-project servers live in user-level config, not the shared project file."},
 {t:"single",w:2,q:"A teammate hardcoded an API key in <code>.mcp.json</code> and committed it. Problems?",
  o:["None.","The secret is now in version history; use <code>${ENV_VAR}</code> expansion and rotate the exposed key.","It improves portability.","It speeds builds."],c:[1],
  e:"Never commit secrets; reference env vars and rotate anything already exposed."},
 {t:"single",w:1,q:"The default behavior letting Claude decide whether to call a tool at all is…",
  o:["<code>any</code>","<code>auto</code>","<code>none</code>","specific tool"],c:[1],
  e:"<code>auto</code> lets the model choose to use a tool or just respond."},
 {t:"single",w:2,s:"S1",q:"MeridianPay's account-lookup returns <code>[]</code> both when an account truly has no transactions and when the DB is unreachable. Impact?",

 {t:"multi",w:2,q:"Good tool-result design includes which of these?",

 {t:"single",w:1,q:"A tool returns 50 KB of JSON but Claude needs three fields. Best practice?",

 {t:"single",w:1,q:"Tool names should be…",

 {t:"single",w:1,q:"MCP (Model Context Protocol) primarily provides…",

 {t:"single",w:1,q:"To guarantee a turn produces text and never a tool call, use…",

 {t:"single",w:1,q:"In <code>.mcp.json</code>, the supported way to inject a token from the environment is…",

 {t:"single",w:1,q:"An MCP server in <code>.mcp.json</code> fails only for a teammate. First thing to check?",
  o:["Their GPU.","Whether their required env vars/credentials are set and the server's dependencies are installed locally.","Their LinkedIn.","The model version."],c:[1],
  e:"Project config is shared, but each user still needs the referenced env vars/credentials and local prerequisites."},
 {t:"single",w:1,q:"Beyond what a tool does, a strong description should also state…",o:["Only the parameter names.","When to use it and when NOT to — its boundaries and limits.","The model version.","The pricing tier."],c:[1],e:"Descriptions that include usage boundaries and when not to call the tool reduce mis-routing between similar tools."},

D3:[
 {t:"single",w:1,q:"Given user-, project-, and directory-level <code>CLAUDE.md</code> files with a conflicting instruction, which takes precedence?",
  o:["User-level overrides everything.","Project-level always wins.","The more specific (directory-level) instruction overrides the general ones; all applicable levels combine.","Whichever was modified most recently."],c:[2],
  e:"Precedence is by specificity: directory > project > user, with all levels combined and specific overriding general."},
 {t:"single",w:2,s:"S3",q:"CodeForge's lead added team standards to their own <code>~/.claude/CLAUDE.md</code>, but other engineers' sessions ignore them. Why, and fix?",
  o:["The file is corrupted; recreate it.","User-level <code>CLAUDE.md</code> is personal and not shared; move shared standards to project-level <code>./CLAUDE.md</code> (committed) or <code>.claude/rules/</code>.","CLAUDE.md doesn't support standards; use a linter.","Each engineer must <code>--resume</code> the lead's session."],c:[1],
  e:"User-level instructions apply only to that user. Shared standards belong in committed project-level config."},
 {t:"single",w:1,q:"How do <code>.claude/rules/</code> files apply conditionally to specific file types?",
  o:["They run on every file regardless of type.","They apply based on file glob patterns (e.g. <code>*.tsx</code>), giving granular type-specific rules.","They only apply to files in the project root.","They require a directory-level <code>CLAUDE.md</code>."],c:[1],
  e:"Rules files apply conditionally via glob patterns — a more granular alternative to directory-level CLAUDE.md."},
 {t:"single",w:1,q:"A reusable skill should run in a copy of the conversation and NOT alter the main thread. Which frontmatter setting?",
  o:["<code>allowed-tools: all</code>","<code>context: fork</code>","<code>mode: plan</code>","<code>scope: project</code>"],c:[1],
  e:"<code>context: fork</code> runs the skill in a forked context — for exploratory work that shouldn't modify the main conversation."},
 {t:"single",w:1,q:"What is the purpose of the <code>allowed-tools</code> field in a skill's frontmatter?",
  o:["To list which models the skill can call.","To define a security boundary specifying which tools the skill may use.","To auto-install missing tools.","To set the skill's token budget."],c:[1],
  e:"<code>allowed-tools</code> restricts the skill's tool access — a security boundary."},
 {t:"single",w:2,s:"S3",q:"CodeForge plans a refactor touching 12 files across core billing logic. Which Claude Code mode, and why?",
  o:["Direct Execution, because it's fast.","Plan Mode, because the change is large, high-risk, and touches core logic — review the plan first.","Direct Execution, since billing is well understood.","Neither; disable Claude Code for billing."],c:[1],
  e:"Plan Mode suits large/high-risk/ambiguous changes; Direct Execution suits small, well-defined, low-risk edits."},
 {t:"single",w:1,q:"Which task is the best fit for Direct Execution rather than Plan Mode?",
  o:["Renaming a single local variable in one well-understood function.","Migrating the auth layer across the codebase.","Rewriting the production data model.","A refactor spanning 10 files."],c:[0],
  e:"Direct Execution fits small, well-understood, low-risk changes; the others call for Plan Mode."},
 {t:"single",w:2,s:"S3",q:"CodeForge wants Claude Code to run non-interactively in CI to review PRs (stdin→stdout, no prompts). Which flag?",
  o:["<code>--resume</code>","<code>-p</code> (pipe / non-interactive mode)","<code>--plan</code>","<code>/compact</code>"],c:[1],
  e:"<code>-p</code> enables non-interactive pipe mode for CI/CD automation."},
 {t:"single",w:2,s:"S3",q:"In CodeForge's CI, the same instance that generated the code also reviews it. Why change this, and to what?",
  o:["Keep it — self-review is efficient and equally effective.","Use an independent reviewing instance; a self-reviewing one shares the generator's blind spots.","Replace review with a higher iteration cap.","Have the same instance review twice."],c:[1],
  e:"Independent review beats self-review; a separate instance without the generation reasoning catches what the author missed."},
 {t:"single",w:1,q:"Claude Code isn't following an expected instruction. The single most common real-world misconfiguration is…",
  o:["The instruction was written in Markdown.","Shared team standards placed at the user level instead of project level.","The project lacked a <code>.mcp.json</code>.","Plan Mode was left enabled."],c:[1],
  e:"The recurring trap: shared standards at the user level (personal) instead of the committed project level."},
 {t:"multi",w:2,q:"Designing Claude Code into CI/CD pipelines, which practices are recommended?",
  o:["Use <code>-p</code> for non-interactive operation.","For PR review, use a separate instance from the generator.","Scope a test-gen job to only testing-related tools/files.","Have the generating instance review its own output."],c:[0,1,2],
  e:"Pipe mode, independent review, and least-privilege scoping — yes; self-review contradicts the independence principle."},
 {t:"single",w:1,q:"Where should shared, version-controlled team instructions for Claude Code live?",
  o:["Each developer's <code>~/.claude/CLAUDE.md</code>.","The project-level <code>./CLAUDE.md</code> (committed) or <code>.claude/rules/</code>.","A pinned chat message.","The <code>.mcp.json</code> file."],c:[1],
  e:"Project-level CLAUDE.md (committed) or rules files are the shared, team-wide mechanism."},
 {t:"single",w:1,q:"<code>CLAUDE.md</code> primarily provides…",
  o:["Secret storage.","Persistent project/context instructions Claude Code loads automatically.","A CI pipeline.","An MCP server."],c:[1],
  e:"CLAUDE.md holds standing instructions/context loaded into Claude Code sessions."},
 {t:"single",w:2,s:"S3",q:"CodeForge wants stricter rules only inside <code>/src/payments</code>. Best mechanism?",
  o:["Edit the user-level CLAUDE.md.","Add a directory-level CLAUDE.md (or a glob-scoped rules file) for that path.","A global env var.","A commit message."],c:[1],
  e:"Directory-level CLAUDE.md or glob-scoped rules apply more specific instructions to a subtree."},
 {t:"single",w:1,q:"To apply a rule only to TypeScript React files, you'd scope it with…",
  o:["A CLAUDE.md in root.","A glob like <code>*.tsx</code> in a rules file.","An env var.","<code>tool_choice</code>."],c:[1],
  e:"Rules files target file types via glob patterns."},
 {t:"single",w:2,s:"S3",q:"Why isn't having the generating instance review its own diff sufficient at CodeForge?",
  o:["It's slower.","It shares the generator's assumptions/blind spots and tends not to question its own choices; use an independent reviewer.","It costs more tokens.","It needs Plan Mode."],c:[1],
  e:"Self-review inherits generation reasoning; independent review catches what the author missed."},
 {t:"single",w:1,q:"Do project and user <code>CLAUDE.md</code> files combine, or does one replace the other?",
  o:["Only one is ever used.","Applicable levels combine, with specific overriding general on conflicts.","They cancel out.","The newest wins entirely."],c:[1],
  e:"Instructions accumulate across levels; conflicts resolve by specificity."},
 {t:"single",w:2,s:"S3",q:"CodeForge's CI job generates tests. Best scoping?",
  o:["Give it full repo write and all tools.","Restrict it to test directories and only the tools it needs.","Let it modify production code too.","Disable review."],c:[1],
  e:"Scope automated instances to the files/tools required — least privilege."},
 {t:"single",w:1,q:"The main value of Plan Mode is…",
  o:["Faster edits.","Reviewing the intended changes before any code is modified.","Bypassing tests.","Hiding diffs."],c:[1],
  e:"Plan Mode surfaces the plan for approval before execution, reducing risk on big changes."},
 {t:"single",w:1,q:"Claude Code reads project MCP servers from…",
  o:["<code>README.md</code>.","<code>.mcp.json</code> (project) / <code>~/.claude.json</code> (user).","<code>package.json</code> only.","<code>CLAUDE.md</code>."],c:[1],
  e:"The same MCP config locations apply: project <code>.mcp.json</code> and user <code>~/.claude.json</code>."},
 {t:"single",w:2,s:"S3",q:"How should CodeForge wire PR review to avoid self-review?",
  o:["Same session generates and reviews.","A separate Claude Code invocation (fresh context) reviews the PR.","Review twice in the same session.","Skip review under deadline."],c:[1],
  e:"Use an independent invocation without the generation context for review."},
 {t:"single",w:1,q:"Which is the best practice for a destructive refactor across many files where you want to inspect the approach first?",
  o:["Direct Execution with auto-accept.","Plan Mode, then review and approve before changes are applied.","No configuration; just run it.","Lower the temperature."],c:[1],
  e:"Plan Mode lets you review the plan before any file is touched — right for high-risk, multi-file work."},
 {t:"single",w:2,s:"S3",q:"A CodeForge engineer wants personal scratch instructions that must not affect teammates. Where do they belong?",o:["The committed project-level CLAUDE.md.","The user-level config (e.g. ~/.claude), which is personal and not shared.","A glob rules file in the repo.","The team Slack channel."],c:[1],e:"Personal, non-shared instructions go in user-level config; the committed project config is for the whole team."},
 {t:"single",w:1,q:"In Plan Mode, Claude Code…",o:["Edits files immediately for speed.","Researches and proposes a plan, making no file changes until you approve.","Skips the diff entirely.","Disables the test suite."],c:[1],e:"Plan Mode is read-and-plan: it surfaces the intended approach for approval before any file is modified."},
 {t:"single",w:2,s:"S3",q:"CodeForge needs a one-line tweak to a well-understood config value. Best mode?",o:["Plan Mode, to be safe on everything.","Direct Execution — the change is small, clear, and low-risk.","Neither; only edit it by hand.","Lower the temperature first."],c:[1],e:"Small, clear, low-risk edits are the canonical case for Direct Execution; Plan Mode is for large or risky work."},
 {t:"single",w:1,q:"You need guidance that applies only to <code>*.py</code> files, while CLAUDE.md applies broadly. Better mechanism?",o:["Put it in the root CLAUDE.md.","Use a glob-scoped rules file targeting <code>*.py</code>.","Use an environment variable.","Use <code>tool_choice</code>."],c:[1],e:"Glob-scoped rules files apply file-type-specific guidance more precisely than a broad CLAUDE.md."},
 {t:"single",w:1,q:"If a skill does not specify <code>allowed-tools</code>, the safer posture is to…",o:["Assume it may use every available tool.","Explicitly scope its tools to only what it needs (least privilege).","Disable the skill entirely.","Grant it network access."],c:[1],e:"Least privilege: scope a skill's tool access explicitly rather than granting broad capability by default."},
 {t:"single",w:1,q:"A skill whose changes must persist into the main workflow should NOT use <code>context: fork</code> because…",o:["Forking is slower.","Forked work runs in an isolated copy and would not carry back to the main thread.","It needs Plan Mode.","Forking deletes history."],c:[1],e:"<code>context: fork</code> isolates the skill; use it for exploration, not for changes that must persist to the main conversation."},
 {t:"single",w:2,s:"S3",q:"CodeForge wants the same standards enforced both locally and in CI. Best approach?",o:["Keep them in each developer's user config.","Put them in committed project-level config so humans and CI runs both inherit them.","Paste them into each CI job manually.","Rely on people remembering them."],c:[1],e:"Committed project-level config is the single source both interactive sessions and CI invocations load."},
 {t:"single",w:1,q:"A directory-level CLAUDE.md placed in <code>/src/api</code> applies to…",o:["The whole repository equally.","Files under that directory, layering on top of project- and user-level instructions.","Only the README.","Nothing unless merged to main."],c:[1],e:"Directory-level instructions scope to that subtree and combine with the broader levels, overriding them on conflict."},
],
D4:[
 {t:"single",w:1,q:"An agent's summaries vary in length, tone, and content. Which prompt change most directly addresses this?",
  o:["Add \"please be consistent.\"","Replace vague guidance with explicit, measurable criteria (length range, required elements, tone, exclusions).","Raise temperature for variety.","Switch to the Batch API."],c:[1],
  e:"Explicit, measurable criteria produce consistent, verifiable output; vague terms like \"good\" can't be enforced."},
 {t:"single",w:1,q:"Recommended number of few-shot examples for output consistency?",
  o:["0–1","2–4, ideally covering edge cases and the exact format.","10–12 for max coverage.","As many as fit in the context."],c:[1],
  e:"2–4 is the sweet spot; fewer may not establish the pattern, more gives diminishing returns and wastes context."},
 {t:"single",w:2,s:"S4",q:"LexBrief extracts fields from contracts where values are sometimes absent or ambiguous. Schema design?",
  o:["Make all fields required so nothing is missed.","Use nullable fields for possibly-absent data and add an \"unclear\"/\"ambiguous\" enum option so Claude can flag uncertainty.","Force a default for every missing field.","Drop records with missing data."],c:[1],
  e:"Nullable fields plus an \"unclear\" enum value let Claude signal uncertainty for human review instead of guessing."},
 {t:"single",w:2,q:"A <code>tool_use</code> JSON schema guarantees…",
  o:["Both structure and the correctness/meaning of values.","Structural correctness (fields, types, shape) only — not semantic validity.","That values fall in business-rule ranges.","Output free of hallucinated facts."],c:[1],
  e:"Schemas enforce syntax, not semantics. You still need programmatic validation plus a retry loop."},
 {t:"multi",w:2,q:"Designing a validation retry loop for structured output, which elements are correct?",
  o:["Validate the schema-constrained output against semantic/business rules in code.","On failure, send both the invalid output and the specific errors back to Claude.","Cap retries at a maximum count.","Keep retrying with the identical prompt and no error detail."],c:[0,1,2],
  e:"Validate in code, return the invalid output plus specific errors, cap retries. Re-sending unchanged just repeats the mistake."},
 {t:"single",w:2,s:"S4",q:"What is the complete, production-grade pipeline for reliable structured extraction at LexBrief?",
  o:["A very detailed prompt instructing valid JSON, nothing more.","<code>tool_use</code> schema (syntax) + programmatic validation (semantics) + a retry loop returning errors to Claude.","Schema enforcement alone.","Manual human entry for every contract."],c:[1],
  e:"The three layers: schema + validation + retry. Prompt-only is weakest; schema-only is incomplete."},
 {t:"single",w:2,q:"A high-volume system relies solely on \"always return valid JSON\" and sees occasional malformed output. Best fix?",
  o:["Strengthen wording to \"you MUST always return valid JSON.\"","Add <code>tool_use</code> schema enforcement, then validation, then a retry loop.","Lower temperature to 0 and keep prompt-only.","Strip characters until it parses."],c:[1],
  e:"Prompt-only enforcement is probabilistic; at scale even 1% failure is large. Use schema + validation + retry."},
 {t:"single",w:2,s:"S4",q:"LexBrief must process 80,000 archived contracts overnight; nothing waits in real time and cost matters. Is the Batch API appropriate?",
  o:["No — it can't process documents.","Yes — non-blocking, high-volume background processing is the ideal use case, ~50% cheaper.","No — only the real-time API extracts structured data.","Yes, but only with multi-turn per request."],c:[1],
  e:"Batch fits non-blocking, large-volume background work and gives ~50% savings."},
 {t:"single",w:2,q:"A request/response pipeline where the user waits proposes switching to the Batch API for cost. Correct assessment?",
  o:["Approve — 50% savings always justifies it.","Reject — Batch has no SLA within its 24-hour window, so it's inappropriate for blocking/real-time workflows.","Approve if latency is under a minute.","Approve if multi-turn is disabled."],c:[1],
  e:"Batch returns within 24h with no in-window SLA; using it for blocking workflows is a named anti-pattern."},
 {t:"multi",w:1,q:"Which statements about the Batch API are correct?",
  o:["~50% cost reduction vs real-time calls.","Results within 24 hours, no guaranteed SLA inside that window.","Requests are independent; no multi-turn conversations.","Guarantees sub-minute latency for live chat."],c:[0,1,2],
  e:"Cost savings, a 24h non-SLA window, and no multi-turn — true. No real-time latency guarantee."},
 {t:"single",w:2,q:"For a critical output you add a review step. Key requirement for it to be effective?",
  o:["The reviewer should be the same instance that generated, for consistency.","The reviewer must be independent of the generator (no shared generation context).","Use extended thinking on the generator instead.","Ask the generator to rate its own confidence."],c:[1],
  e:"Independent review > self-review; an instance without the generator's context catches subtle issues."},
 {t:"single",w:1,q:"Beyond using 2–4 examples, what makes few-shot examples most effective?",
  o:["All illustrate the simplest happy path.","Diverse, covering edge cases, demonstrating the exact output format.","As long and detailed as possible.","Omit the output to avoid bias."],c:[1],
  e:"Diversity, edge-case coverage, and exact-format demonstration drive consistency."},
 {t:"single",w:1,q:"Outputs vary because the prompt says \"summarize well.\" Most effective change?",
  o:["Add \"be consistent.\"","Specify measurable criteria — length, required sections, tone, exclusions.","Raise temperature.","Add five more examples beyond four."],c:[1],
  e:"Replace vague terms with explicit, checkable criteria."},
 {t:"single",w:2,s:"S6",q:"Some Sentinel claims lack a <code>diagnosis_code</code>. Schema design?",
  o:["Make it required.","Make it nullable and let an enum carry 'unknown'/'unclear' so the model flags rather than guesses.","Default it to 0.","Drop those claims."],c:[1],
  e:"Nullable fields plus an 'unclear' option let the model signal uncertainty for human routing."},
 {t:"single",w:2,q:"At 1M requests/day, \"always return valid JSON\" as the only safeguard…",
  o:["Is fine.","Will still produce many malformed outputs; add schema + validation + retry.","Guarantees validity at temperature 0.","Needs only stronger wording."],c:[1],
  e:"Probabilistic prompting fails at scale; enforce programmatically."},
 {t:"single",w:1,q:"The Batch API offers roughly…",
  o:["No savings.","~50% cost savings vs standard calls.","2× cost.","Free usage."],c:[1],
  e:"Batch trades latency for about half the cost."},
 {t:"single",w:2,s:"S6",q:"Sentinel reprocesses 500k historical claims overnight; nothing waits in real time. Batch API?",
  o:["Inappropriate.","Appropriate — non-blocking, high-volume background work, ~50% cheaper.","Only if multi-turn.","Only the real-time API works."],c:[1],
  e:"Ideal Batch use case: large, non-blocking background jobs."},
 {t:"single",w:1,q:"Batch API requests are…",
  o:["Stateful multi-turn conversations.","Independent; multi-turn isn't supported.","Always two-turn.","Streamed live."],c:[1],
  e:"Each batch request is independent — no multi-turn."},
 {t:"single",w:1,q:"On a failed validation, the most effective retry…",
  o:["Resends the same prompt unchanged.","Returns the invalid output plus the specific errors so Claude can correct them.","Lowers temperature only.","Gives up immediately."],c:[1],
  e:"Feed back concrete errors; don't just repeat the request."},
 {t:"single",w:2,s:"S6",q:"Sentinel adds a check on high-value payouts. For it to add value…",
  o:["The same instance re-checks its own extraction.","An independent instance (no extraction context) reviews the result.","Ask the extractor its confidence.","Increase max_tokens."],c:[1],
  e:"Independent review beats self-review or self-confidence."},
 {t:"single",w:1,q:"To get consistent machine-readable output, you should…",
  o:["Hope for the best.","Define the exact format and enforce it via schema, not just describe it loosely.","Raise temperature.","Use the Batch API."],c:[1],
  e:"Specify and enforce the format explicitly."},
 {t:"single",w:1,q:"Prompt engineering alone (no validation) is acceptable when…",
  o:["Output feeds an automated, high-stakes pipeline.","Output is read by a human who can catch issues and stakes are low.","At massive scale with strict schemas.","It never matters."],c:[1],
  e:"Low-stakes, human-in-the-loop reading tolerates prompt-only; automated/high-stakes needs enforcement."},
 {t:"single",w:2,q:"To force a field to one of four statuses, the strongest method is…",
  o:["Ask nicely in the prompt.","An enum in the schema (plus validation), optionally with 'unclear'.","Free text.","A regex in the description."],c:[1],
  e:"Enums constrain allowed values structurally; add 'unclear' for ambiguity."},
 {t:"single",w:1,q:"Beyond schema, what most reduces fabricated values in extraction?",
  o:["Requiring every field.","Allowing nulls/'unclear' plus validation so the model can decline instead of guess.","Higher temperature.","Longer prompts."],c:[1],
  e:"Letting the model signal 'absent/unclear' and validating it curbs fabrication; forcing all fields invites guesses."},
 {t:"single",w:1,q:"Stable role and formatting instructions versus the specific input for one request belong, respectively, in…",o:["Both in the user message.","The system prompt (stable instructions) and the user message (the specific input).","Both in the system prompt.","The tool description."],c:[1],e:"Put durable instructions in the system prompt and the per-request data in the user message."},
 {t:"single",w:1,q:"A lightweight way to push Claude toward starting its reply as JSON is to…",o:["Ask more forcefully in the prompt.","Prefill the assistant turn with an opening brace so it continues the structure.","Raise the temperature.","Use the Batch API."],c:[1],e:"Prefilling the assistant message (e.g. with an opening brace) nudges the format, though a schema plus validation is still the robust enforcement."},
 {t:"single",w:1,q:"To clearly separate instructions, examples, and the input within one prompt, a reliable technique is…",o:["Run everything together in one paragraph.","Delimit sections with XML-style tags.","Remove all structure.","Use only emojis."],c:[1],e:"XML-style tags delimit prompt sections, reducing ambiguity about which text is instruction versus data."},
 {t:"single",w:1,q:"For a deterministic extraction task, the temperature should generally be…",o:["High, for creativity.","Low (often 0), to make output stable and repeatable.","Irrelevant to output.","Maxed out."],c:[1],e:"Low temperature suits deterministic, structured tasks where you want consistent, repeatable output."},
 {t:"single",w:2,q:"A schema accepts the JSON, but <code>end_date</code> precedes <code>start_date</code>. What catches this?",o:["The schema alone.","Programmatic semantic validation (business rules) after schema-checking.","A stronger prompt only.","Higher temperature."],c:[1],e:"Schemas check shape, not meaning; a date-ordering rule is a semantic check enforced in code, not by the schema."},
 {t:"single",w:1,q:"For a hard classification, letting the model briefly reason before emitting the final structured answer tends to…",o:["Always hurt accuracy.","Improve accuracy, provided the reasoning and the final structured field are kept separate.","Violate the schema.","Require the Batch API."],c:[1],e:"Allowing brief reasoning before the final answer can improve quality; keep the reasoning separate from the validated structured field."},
],
D5:[
 {t:"single",w:2,q:"An agent reliably forgets instructions in the middle of a long context but honors those at the ends. What is this, and a fix?",
  o:["Token starvation; raise <code>max_tokens</code>.","The lost-in-the-middle effect; place persistent critical facts at the top, trim verbose outputs, add summaries at the top.","Temperature drift; set temperature to 0.","A model bug; switch models."],c:[1],
  e:"Models attend most to the beginning and end of long contexts. Reposition critical info to high-attention zones and trim verbosity."},
 {t:"multi",w:2,s:"S2",q:"HelixCare must define escalation. Which are VALID escalation triggers?",
  o:["The user explicitly asks for a human.","The applicable policy is ambiguous.","No progress after N attempts.","Sentiment analysis flags 'seems upset.'"],c:[0,1,2],
  e:"Explicit request, ambiguous policy, and no-progress — valid, observable triggers. Sentiment is poorly calibrated and not valid."},
 {t:"single",w:2,s:"S2",q:"An engineer proposes adding sentiment-based escalation \"as an additional safety measure\" on top of the valid triggers. Best response?",
  o:["Approve — extra safety never hurts.","Reject — sentiment is unreliable and injects a miscalibrated signal, causing false positives and negatives, even as an add-on.","Approve only for high-risk cases.","Replace the valid triggers with sentiment entirely."],c:[1],
  e:"Sentiment-based escalation is incorrect even framed as an extra safeguard; it adds an unreliable signal."},
 {t:"single",w:2,q:"Is asking Claude \"how confident are you (1–10)?\" and escalating below a threshold sound?",
  o:["Yes — it directly measures accuracy.","No — self-assessed confidence is poorly calibrated; it's another generation, not an independent measurement.","Yes, if you average scores.","Yes, for low-risk domains only."],c:[1],
  e:"Self-reported confidence is unreliable. Use observable, programmatic triggers instead."},
 {t:"single",w:1,q:"Which context-degradation strategy best fits an interactive Claude Code session where a human can trigger management?",
  o:["The scratchpad pattern only.","Subagent delegation only.","The <code>/compact</code> command, which summarizes and starts a fresh context with the summary.","Raising the iteration cap."],c:[2],
  e:"<code>/compact</code> is the manual trigger for interactive sessions. Scratchpads suit growing single-agent context; delegation suits large volumes."},
 {t:"single",w:2,s:"S4",q:"LexBrief sees accuracy drop when 50 contracts are stuffed into one context for cross-document comparison. Best approach?",
  o:["Increase the context window and include all 50.","Extract key facts per document, then compare the extracted facts in a synthesis pass — avoid one giant context.","Tell it to 'pay attention to everything.'","Randomly drop half."],c:[1],
  e:"\"Larger context = better attention\" is an anti-pattern. Use per-document passes plus synthesis."},
 {t:"single",w:2,s:"S4",q:"LexBrief's overnight batch crashes midway. Which recovery pattern ensures no work is lost or duplicated?",
  o:["Restart the whole job from scratch.","A manifest file: list all tasks up front, update completion status as each finishes, and on restart retry only incomplete tasks.","<code>fork_session</code> from the last response.","Increase the token budget and rerun."],c:[1],
  e:"Manifest files track task list, status, and partial results, so recovery retries only what's incomplete."},
 {t:"single",w:1,q:"Match recovery to context. Which pairing is correct?",
  o:["Interactive interrupted session → manifest files.","Batch operation → <code>--resume</code>.","Interactive interrupted session → <code>--resume</code>; batch operation → manifest files.","Both → <code>fork_session</code>."],c:[2],
  e:"Interactive interrupted work → <code>--resume</code>; batch operations → manifest files; multi-stage pipelines → checkpointing."},
 {t:"single",w:2,q:"You can review only 5% of outputs, and random review misses the riskiest. Recommended approach?",
  o:["Review 100% regardless of cost.","Stratified sampling — classify by risk and review a higher share of high-risk outputs, feeding results back to improve the system.","Review only the first 10 each day.","Review a flat random 5% with no weighting."],c:[1],
  e:"Stratified sampling maximizes QA value per review: sample more from high-risk strata and use findings to improve the system."},
 {t:"single",w:1,q:"The lost-in-the-middle effect is…",
  o:["Token billing in the middle.","Reduced attention to information in the middle of a long context vs the ends.","A streaming bug.","A tokenizer error."],c:[1],
  e:"Models attend most to the start and end; middle content is easily missed."},
 {t:"single",w:2,q:"Critical, must-not-be-missed instructions in a long context should go…",
  o:["Buried in the middle.","Near the top (and/or restated at the end).","In random positions.","Only in tool outputs."],c:[1],
  e:"Place key instructions in high-attention positions — top and end."},
 {t:"single",w:1,q:"The scratchpad pattern helps when…",
  o:["You have many parallel agents.","A single agent's working context grows and benefits from externalizing notes/intermediate state.","You need the Batch API.","Routing fails."],c:[1],
  e:"Scratchpads externalize intermediate state to manage a single agent's growing context."},
 {t:"single",w:2,s:"S6",q:"Sentinel stuffs 100 claims into one prompt for cross-checking and accuracy drops. Better?",
  o:["Enlarge the context and add all 100.","Extract per-claim, then compare the extracted facts in a synthesis step.","Tell it to 'focus on everything.'","Random-drop half."],c:[1],
  e:"Avoid one giant context; use per-item passes plus synthesis."},
 {t:"single",w:1,q:"\"A bigger context window automatically means better attention/accuracy\" is…",
  o:["True.","False — more context can dilute attention; manage what you include.","True at temperature 0.","Only true for code."],c:[1],
  e:"Capacity is not attention; curate context rather than maximizing it."},

/* ============================================================
   ENGINE
   ============================================================ */
const TOTAL_SECONDS = 120*60;
const PASS = 720;
const BANK_TOTAL = Object.values(BANK).reduce((s,a)=>s+a.length,0);
const state = {
  screen:"start", mode:"exam",
  questions:[], totalWeight:0,
  current:0, answers:{}, flagged:new Set(),
  remaining:TOTAL_SECONDS, timer:null, submitted:false, timeUsed:0,
  reviewFilter:"all", navOpen:false,
};
const app = document.getElementById('app');
const letters = ["A","B","C","D","E","F"];

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function prepare(q,d){
  const pairs = q.o.map((text,idx)=>({text, ok:q.c.includes(idx)}));
  shuffle(pairs);
  let s = q.s;
  if(s && !SCN[s]){ console.error(`CCA-F init: ${d} question references unknown scenario "${s}" — falling back to no scenario panel.`); s = undefined; }
  return { d, t:q.t, w:q.w, s, q:q.q, e:q.e,
           o:pairs.map(p=>p.text),
           c:pairs.map((p,i)=>p.ok?i:-1).filter(i=>i>=0) };
}
function buildExam(){
  let out=[];
  for(const d of Object.keys(DRAW)){
    const pool=[...BANK[d]]; shuffle(pool);
    const take=pool.slice(0, Math.min(DRAW[d], pool.length)).map(q=>prepare(q,d));
    out=out.concat(take);
  }
  shuffle(out);
  state.questions=out;
  state.totalWeight=out.reduce((s,q)=>s+q.w,0);
}

function setEqual(a,b){ if(a.length!==b.length) return false; const x=[...a].sort(),y=[...b].sort(); return x.every((v,i)=>v===y[i]); }
function isAnswered(i){ const a=state.answers[i]; return a && a.length>0; }
function isCorrect(i){ const a=state.answers[i]||[]; return setEqual(a, state.questions[i].c); }
function fmt(sec){ const m=Math.floor(sec/60),s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }
function toggleNav(){ state.navOpen=!state.navOpen; const p=document.querySelector('.navpanel'); if(p) p.classList.toggle('open',state.navOpen); }

/* ---------- safety: allow-list HTML sanitizer (keeps <code>, neutralizes anything else) ---------- */
function safeText(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeHTML(s){ return safeText(s).replace(/&lt;code&gt;/g,'<code>').replace(/&lt;\/code&gt;/g,'</code>'); }
function scenarioOf(q){ return (q && q.s && SCN[q.s]) ? SCN[q.s] : null; }
function navLabel(j, ans, fl){ return `Question ${j+1}, ${ans?'answered':'not answered'}${fl?' and marked for review':''}`; }

/* ---------- state persistence (best-effort; degrades gracefully if storage is blocked) ---------- */
const STORAGE_KEY = 'ccaf_mock_session_v1';
const storageOK = (function(){ try{ const t='__ccaf__'; localStorage.setItem(t,'1'); localStorage.removeItem(t); return true; }catch(e){ return false; } })();
function persist(){
  if(!storageOK || state.screen!=='exam' || state.submitted) return;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      v:1, savedAt:Date.now(), mode:state.mode, current:state.current,
      answers:state.answers, flagged:[...state.flagged],
      remaining:state.remaining, questions:state.questions, totalWeight:state.totalWeight
    }));
  }catch(e){ /* quota/serialization — persistence is non-critical, ignore */ }
}
function loadSession(){
  if(!storageOK) return null;
  try{
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(!d || !Array.isArray(d.questions) || d.questions.length!==60) return null;
    return d;
  }catch(e){ return null; }
}
function clearSession(){ if(!storageOK) return; try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }

function tick(){
  state.remaining--;
  updateTimer();
  if(state.remaining % 5 === 0) persist();            // periodic time checkpoint
  if(state.remaining<=0){ clearInterval(state.timer); state.timer=null; toast("Time's up — submitting."); finishExam(); }
}
function restoreSession(d){
  state.mode = d.mode==='study' ? 'study' : 'exam';
  state.questions = d.questions;
  state.totalWeight = (d.totalWeight!=null) ? d.totalWeight : d.questions.reduce((s,q)=>s+q.w,0);
  state.current = Math.min(Math.max(0, d.current|0), state.questions.length-1);
  state.answers = (d.answers && typeof d.answers==='object') ? d.answers : {};
  state.flagged = new Set(Array.isArray(d.flagged) ? d.flagged : []);
  state.remaining = (d.remaining!=null) ? d.remaining : TOTAL_SECONDS;
  state.submitted = false; state.screen = 'exam';
  if(state.timer){ clearInterval(state.timer); state.timer=null; }
  if(state.mode==='exam'){ state.timer = setInterval(tick, 1000); }
  renderExam(); window.scrollTo(0,0);
}

/* ---------- targeted DOM updates (no full re-render on each click) ---------- */
function paintOptions(){
  const i=state.current, q=state.questions[i], sel=state.answers[i]||[];
  document.querySelectorAll('#opts .opt').forEach((el,oi)=>{
    if(el.classList.contains('locked')) return;
    const chosen = sel.includes(oi);
    el.classList.toggle('sel', chosen);
    el.setAttribute('aria-pressed', chosen?'true':'false');
    const mark = el.querySelector('.mark');
    if(mark) mark.textContent = chosen ? (q.t==='single'?'●':'✓') : '';
  });
}
function paintNavCell(j){
  const el=document.getElementById('nav-'+j); if(!el) return;
  const ans=isAnswered(j), fl=state.flagged.has(j);
  el.classList.toggle('answered', !!ans);
  el.classList.toggle('flagged', fl);
  el.setAttribute('aria-label', navLabel(j, !!ans, fl));
}
function paintProgress(){
  const answered=state.questions.filter((_,j)=>isAnswered(j)).length;
  const pill=document.getElementById('progresspill');
  if(pill) pill.innerHTML = `Question <b>${state.current+1}</b> of 60 · ${answered} answered${state.mode==='study'?' · study mode':''}`;
  const cnt=document.getElementById('submitcnt');
  if(cnt) cnt.textContent = `${60-answered} unanswered · ${state.flagged.size} flagged`;
}
function lockAndExplain(){
  const i=state.current, q=state.questions[i], sel=state.answers[i]||[], ok=isCorrect(i);
  document.querySelectorAll('#opts .opt').forEach((el,oi)=>{
    el.classList.add('locked'); el.setAttribute('disabled',''); el.classList.remove('sel'); el.removeAttribute('aria-pressed');
    const correct=q.c.includes(oi), chosen=sel.includes(oi), mark=el.querySelector('.mark');
    el.classList.remove('correct','wrong','miss');
    if(correct && chosen){ el.classList.add('correct'); if(mark) mark.textContent='✓'; }
    else if(correct && !chosen){ el.classList.add('miss'); if(mark) mark.textContent=''; }
    else if(!correct && chosen){ el.classList.add('wrong'); if(mark) mark.textContent='✕'; }
    else if(mark){ mark.textContent=''; }
  });
  const card=document.querySelector('.qcard');
  if(card && !card.querySelector('.explain')){
    const ex=document.createElement('div'); ex.className='explain';
    const v=document.createElement('div'); v.className='verdict '+(ok?'v-right':'v-wrong'); v.textContent = ok?'✓ Correct':'✕ Not quite';
    const k=document.createElement('div'); k.className='ekey'; k.textContent='Why';
    const p=document.createElement('p'); p.innerHTML=safeHTML(q.e);
    ex.appendChild(v); ex.appendChild(k); ex.appendChild(p); card.appendChild(ex);
  }
}

/* ---------- keyboard navigation (active only during the exam) ---------- */
function onKey(e){
  if(state.screen!=='exam' || state.submitted) return;
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  const tag=(e.target && e.target.tagName)||''; if(tag==='INPUT'||tag==='TEXTAREA') return;
  const q=state.questions[state.current]; if(!q) return;
  const k=e.key, low=(k||'').toLowerCase();
  if(k>='1' && k<='6'){ const oi=parseInt(k,10)-1; if(oi<q.o.length){ e.preventDefault(); selectOpt(oi); } return; }
  if(k==='ArrowRight' || low==='n' || low==='d'){ e.preventDefault(); (state.current===state.questions.length-1) ? confirmSubmit() : go(1); return; }
  if(k==='ArrowLeft'  || low==='p' || low==='a'){ e.preventDefault(); go(-1); return; }
  if(low==='m'){ e.preventDefault(); toggleFlag(); return; }
}

/* ---------- partial-credit evaluation (console only; displayed score stays strict) ---------- */
function logEvaluation(){
  try{
    const rows=[]; let strictPts=0, partialPts=0; const tw=state.totalWeight||1;
    state.questions.forEach((q,i)=>{
      const sel=new Set(state.answers[i]||[]), cor=new Set(q.c);
      const strict = isCorrect(i)?1:0;
      let partial;
      if(q.t==='single'){ partial=strict; }
      else {
        const hit=[...sel].filter(x=>cor.has(x)).length;
        const bad=[...sel].filter(x=>!cor.has(x)).length;
        const wrongAvail=Math.max(1, q.o.length - cor.size);
        partial=Math.max(0, Math.min(1, hit/cor.size - bad/wrongAvail));
      }
      strictPts+=strict*q.w; partialPts+=partial*q.w;
      rows.push({Q:i+1, domain:q.d, type:q.t, weight:q.w, strict, partial:+partial.toFixed(2)});
    });
    const strictScaled=Math.round(strictPts/tw*1000), partialScaled=Math.round(partialPts/tw*1000);
    console.groupCollapsed(`CCA-F evaluation — strict ${strictScaled}/1000 · partial-credit ${partialScaled}/1000 (pass ≥ ${PASS})`);
    console.table(rows);
    console.info('Displayed score is STRICT (all-or-nothing). Partial-credit is informational only: multi-select credit = (correct chosen ÷ total correct) − (wrong chosen ÷ wrong available), floored at 0.');
    console.groupEnd();
  }catch(e){ console.error('CCA-F evaluation logging failed:', e); }
}

/* ---------- boot: offer to resume an in-progress session ---------- */
function boot(){
  document.addEventListener('keydown', onKey);
  const saved = loadSession();
  if(saved){
    const answered = Object.values(saved.answers||{}).filter(a=>a && a.length).length;
    const resume = confirm(`Resume your in-progress exam?\n\nYou had ${answered} of 60 answered with ${fmt(saved.remaining||0)} remaining.\n\nOK = resume  ·  Cancel = start fresh`);
    if(resume){ restoreSession(saved); return; }
    clearSession();
  }
  renderStart();
}

function pickMode(m){ state.mode=m; document.getElementById('m-exam').classList.toggle('sel',m==='exam'); document.getElementById('m-study').classList.toggle('sel',m==='study'); }

/* ---------- EXAM ---------- */
function startExam(){
  buildExam();
  state.screen="exam"; state.current=0; state.answers={}; state.flagged=new Set(); state.submitted=false; state.remaining=TOTAL_SECONDS;
  if(state.timer){clearInterval(state.timer); state.timer=null;}
  if(state.mode==='exam'){ state.timer=setInterval(tick,1000); }
  clearSession(); persist();
  renderExam(); window.scrollTo(0,0);
}
function updateTimer(){
  const el=document.getElementById('timer'); if(!el) return;
  el.querySelector('.clk').textContent=fmt(state.remaining);
  el.classList.toggle('warn', state.remaining<=600 && state.remaining>120);
  el.classList.toggle('crit', state.remaining<=120);
}
function renderExam(){
  document.getElementById('navToggle').classList.remove('hidden');
  const Q=state.questions, i=state.current, q=Q[i];
  const studyLocked = state.mode==='study' && isAnswered(i);
  const dom=DOMAINS[q.d];
  const answeredCount=Q.filter((_,j)=>isAnswered(j)).length;
  const scenario = scenarioOf(q);
  const scn = scenario ? `<div class="scenario"><div class="sl">Production scenario</div><div class="st">${safeHTML(scenario.title)}</div><div class="sb">${safeHTML(scenario.body)}</div></div>` : "";
  const sel=state.answers[i]||[];
  const opts=q.o.map((text,oi)=>{
    let cls = q.t==='single' ? 'opt radio' : 'opt check';
    const chosen=sel.includes(oi);
    if(chosen) cls+=' sel';
    let mark = chosen ? (q.t==='single'?'●':'✓') : '';
    if(studyLocked){
      cls+=' locked';
      const correct=q.c.includes(oi);
      if(correct && chosen){ cls=cls.replace('sel','')+' correct'; mark='✓'; }
      else if(correct && !chosen){ cls+=' miss'; mark=''; }
      else if(!correct && chosen){ cls=cls.replace('sel','')+' wrong'; mark='✕'; }
    }
    const aria = studyLocked ? '' : ` aria-pressed="${chosen?'true':'false'}"`;
    return `<button class="${cls}"${aria} onclick="selectOpt(${oi})" ${studyLocked?'disabled':''}>
        <span class="mark">${mark}</span>
        <span><span class="lt">${letters[oi]}.</span> ${safeHTML(text)}</span>
      </button>`;
  }).join("");
  let explain="";
  if(studyLocked){
    const ok=isCorrect(i);
    explain=`<div class="explain"><div class="verdict ${ok?'v-right':'v-wrong'}">${ok?'✓ Correct':'✕ Not quite'}</div><div class="ekey">Why</div><p>${safeHTML(q.e)}</p></div>`;
  }
  app.innerHTML = `
  <div class="examhead">
    <button class="homebtn" onclick="goHome()" title="Return to start" aria-label="Home — return to the start screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span>Home</span></button>
    <div class="brandmini"><span class="s">C</span> CCA-F Mock Exam</div>
    <div class="progresspill" id="progresspill">Question <b>${i+1}</b> of 60 · ${answeredCount} answered${state.mode==='study'?' · study mode':''}</div>
    ${state.mode==='exam'?`<div class="timer" id="timer"><span>⏱</span><span class="clk mono">${fmt(state.remaining)}</span></div>`:`<div class="timer" id="timer" style="margin-left:auto"><span>∞</span><span class="clk">untimed</span></div>`}
  </div>
  <div class="examgrid">
    <div>
      <div class="qcard">
        <div class="qmeta">
          <span class="chip chip-num mono">Q${i+1}</span>
          <span class="chip chip-dom">${safeHTML(dom.name)}</span>
          ${q.t==='multi'?'<span class="chip chip-multi">Select all that apply</span>':''}
          ${scenario?'<span class="chip chip-scn">Scenario</span>':''}
        </div>
        ${scn}
        <div class="stem">${safeHTML(q.q)}</div>
        ${q.t==='multi'?'<div class="multi-note">▸ More than one answer is correct.</div>':''}
        <div class="opts" id="opts">${opts}</div>
        ${explain}
      </div>
      <div class="navfoot">
        <button class="btn btn-ghost btn-sm" onclick="go(-1)" ${i===0?'disabled':''}>← Previous</button>
        <button class="flagbtn ${state.flagged.has(i)?'on':''}" id="flagBtn" onclick="toggleFlag()">${state.flagged.has(i)?'★ Flagged':'☆ Flag for review'}</button>
        <span class="spacer"></span>
        ${ i===Q.length-1 ? `<button class="btn btn-primary btn-sm" onclick="confirmSubmit()">Review &amp; submit</button>` : `<button class="btn btn-primary btn-sm" onclick="go(1)">Next →</button>` }
      </div>
    </div>
    <aside class="navpanel ${state.navOpen?'open':''}">
      <h3>Question navigator</h3>
      <div class="navgrid">${navCells()}</div>
      <div class="legend">
        <span class="lg-ans"><i></i>Answered</span>
        <span class="lg-unans"><i></i>Not answered</span>
        <span class="lg-flag"><i></i>Flagged</span>
      </div>
      <div class="submitbar">
        <button class="btn btn-primary btn-sm" style="width:100%" onclick="confirmSubmit()">Submit exam</button>
        <div class="cnt" id="submitcnt">${60-answeredCount} unanswered · ${state.flagged.size} flagged</div>
      </div>
    </aside>
  </div>`;
  updateTimer();
}
function navCells(){
  return state.questions.map((_,j)=>{
    let cls='nq';
    const ans=isAnswered(j), fl=state.flagged.has(j);
    if(ans) cls+=' answered';
    if(fl) cls+=' flagged';
    if(j===state.current) cls+=' current';
    return `<button class="${cls}" id="nav-${j}" role="button" aria-label="${navLabel(j,!!ans,fl)}"${j===state.current?' aria-current="true"':''} onclick="jump(${j})">${j+1}</button>`;
  }).join("");
}
function selectOpt(oi){
  const i=state.current, q=state.questions[i];
  if(state.mode==='study' && isAnswered(i)) return;
  let cur=state.answers[i]?[...state.answers[i]]:[];
  if(q.t==='single'){ cur=[oi]; } else { cur.includes(oi)? cur=cur.filter(x=>x!==oi) : cur.push(oi); }
  state.answers[i]=cur;
  paintOptions(); paintNavCell(i); paintProgress();
  if(state.mode==='study'){ lockAndExplain(); }
  persist();
}
function toggleFlag(){
  const i=state.current;
  state.flagged.has(i)? state.flagged.delete(i) : state.flagged.add(i);
  const btn=document.getElementById('flagBtn');
  if(btn){ const on=state.flagged.has(i); btn.classList.toggle('on',on); btn.textContent = on?'★ Flagged':'☆ Flag for review'; }
  paintNavCell(i); paintProgress(); persist();
}
function go(step){ const n=state.current+step; if(n<0||n>=state.questions.length) return; state.current=n; persist(); renderExam(); window.scrollTo({top:0,behavior:'smooth'}); }
function jump(j){ state.current=j; state.navOpen=false; persist(); renderExam(); window.scrollTo({top:0,behavior:'smooth'}); }
function confirmSubmit(){
  const unans=60-state.questions.filter((_,j)=>isAnswered(j)).length;
  const msg = unans>0 ? `You have ${unans} unanswered question${unans>1?'s':''}. Submit anyway and score now?` : `All 60 answered. Submit and score now?`;
  if(confirm(msg)) finishExam();
}
function finishExam(){
  if(state.timer){clearInterval(state.timer); state.timer=null;}
  state.submitted=true; state.timeUsed=TOTAL_SECONDS-state.remaining; state.screen="results";
  clearSession(); logEvaluation();
  renderResults(); window.scrollTo(0,0);
}

/* ---------- RESULTS ---------- */
function computeScore(){
  let earned=0; const dom={};
  for(const k in DOMAINS) dom[k]={c:0,t:0};
  state.questions.forEach((q,i)=>{
    dom[q.d].t++;
    if(isCorrect(i)){ earned+=q.w; dom[q.d].c++; }
  });
  const scaled=Math.round(earned/state.totalWeight*1000);
  return {scaled, pass:scaled>=PASS, dom, rawCorrect:state.questions.filter((_,i)=>isCorrect(i)).length};
}
function renderResults(){
  document.getElementById('navToggle').classList.add('hidden');
  const r=computeScore();
  const answeredCount = state.questions.filter((_,i)=>isAnswered(i)).length;
  const wrongAnswered = answeredCount - r.rawCorrect;
  const flaggedAnswered = state.questions.filter((_,i)=>isAnswered(i) && state.flagged.has(i)).length;
  const circ=2*Math.PI*86, frac=Math.min(r.scaled/1000,1);
  const col = r.pass? 'var(--green)':'var(--red)';
  const passX=(PASS/1000);
  const breakdown=Object.entries(DOMAINS).map(([k,v])=>{
    const d=r.dom[k]; const pct = d.t? Math.round(d.c/d.t*100):0;
    const bc = pct>=72?'var(--green)':(pct>=50?'var(--amber)':'var(--red)');
    return `<div class="drow">
      <div>
        <div class="dname">${v.name} <span>· Domain ${k.slice(1)} · ${v.weight}% of exam</span></div>
        <div class="dbar"><i style="width:${pct}%; background:${bc}"></i></div>
      </div>
      <div class="dscore" style="color:${bc}">${d.c}/${d.t}<span style="display:block; font-size:12px; color:var(--ink-faint); font-family:var(--ui); font-weight:600">${pct}%</span></div>
    </div>`;
  }).join("");
  app.innerHTML=`
  <div class="resulthero">
    <div class="eyebrow">Result · CCA-F Mock Exam</div>
    <div class="scorering">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="86" fill="none" stroke="var(--line)" stroke-width="14"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="${col}" stroke-width="14" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="arc"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="var(--ink)" stroke-width="14" stroke-dasharray="2 ${circ}" stroke-dashoffset="${-(circ*passX)+1}" opacity="0.55"/>
      </svg>
      <div class="mid"><div class="num" style="color:${col}">${r.scaled}</div><div class="den">OUT OF 1000</div></div>
    </div>
    <div><span class="verdictbig ${r.pass?'pass':'fail'}">${r.pass?'✓ Pass':'✕ Did not pass'}</span></div>
    <div class="subline">${r.pass? `Above the ${PASS} pass line by ${r.scaled-PASS} point${r.scaled-PASS===1?'':'s'}.` : `${PASS-r.scaled} point${PASS-r.scaled===1?'':'s'} short of the ${PASS} pass line.`} The tick on the ring marks 720.</div>
    <div class="statrow">
      <div class="fact"><div class="k">Raw correct</div><div class="v">${r.rawCorrect}<small> / 60</small></div></div>
      <div class="fact"><div class="k">Accuracy</div><div class="v">${Math.round(r.rawCorrect/60*100)}<small>%</small></div></div>
      <div class="fact"><div class="k">Time used</div><div class="v mono" style="font-size:21px">${fmt(state.timeUsed||0)}</div></div>
      <div class="fact"><div class="k">Mode</div><div class="v" style="font-size:19px; text-transform:capitalize">${state.mode}</div></div>
    </div>
  </div>
  <div class="panel breakdown">
    <h2>Performance by domain</h2>
    <p style="color:var(--ink-soft); font-size:14px; margin:-6px 0 12px">Scaled scoring weights scenario and anti-pattern items more heavily, so your point total can differ from raw accuracy. Aim for ~80%+ per domain before sitting the real exam.</p>
    ${breakdown}
  </div>
  <div class="panel">
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between">
      <h2 style="margin:0">Review your answers</h2>
      <button class="btn btn-primary btn-sm" onclick="startExam()">🔀 Retake (new questions)</button>
    </div>
    <p style="color:var(--ink-soft); font-size:14px; margin:10px 0 2px">Only the ${answeredCount} question${answeredCount===1?'':'s'} you answered are shown below, with the correct answer and explanation. Unanswered questions are hidden.</p>
    <div class="reviewfilters" style="margin-top:14px">
      <button class="filt on" data-f="all" onclick="setFilter('all')">Answered (${answeredCount})</button>
      <button class="filt" data-f="wrong" onclick="setFilter('wrong')">Incorrect (${wrongAnswered})</button>
      <button class="filt" data-f="right" onclick="setFilter('right')">Correct (${r.rawCorrect})</button>
      <button class="filt" data-f="flag" onclick="setFilter('flag')">Flagged (${flaggedAnswered})</button>
    </div>
    <div id="reviewList"></div>
    <div style="margin-top:18px"><button class="btn btn-ghost btn-sm" onclick="restart()">← Back to start</button></div>
  </div>
  <div class="footnote">Original practice items aligned to the public CCA-F blueprint · not official Anthropic exam content.</div>`;
  requestAnimationFrame(()=>{ const arc=document.getElementById('arc'); if(arc){ arc.style.transition='stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1)'; arc.style.strokeDashoffset=`${circ*(1-frac)}`; } });
  renderReviewList();
}
function setFilter(f){ state.reviewFilter=f; document.querySelectorAll('.filt').forEach(b=>b.classList.toggle('on',b.dataset.f===f)); renderReviewList(); }
function renderReviewList(){
  const host=document.getElementById('reviewList'); if(!host) return;
  const f=state.reviewFilter;
  const items=state.questions.map((q,i)=>({q,i})).filter(({i})=>{
    if(!isAnswered(i)) return false;            // only answered questions are ever revealed
    if(f==='wrong') return !isCorrect(i);
    if(f==='right') return isCorrect(i);
    if(f==='flag') return state.flagged.has(i);
    return true;
  });
  if(items.length===0){
    const ans=state.questions.filter((_,j)=>isAnswered(j)).length;
    const msg = ans===0 ? "You didn't answer any questions, so there's nothing to review." : "No answered questions match this filter.";
    host.innerHTML=`<p style="color:var(--ink-faint); padding:18px 0">${msg}</p>`; return;
  }
  host.innerHTML=items.map(({q,i})=>{
    const sel=state.answers[i]||[]; const ok=isCorrect(i); const dom=DOMAINS[q.d];
    const scenario = scenarioOf(q);
    const scn = scenario ? `<div class="scenario" style="margin-bottom:14px"><div class="sl">${safeHTML(scenario.title)}</div><div class="sb">${safeHTML(scenario.body)}</div></div>` : "";
    const opts=q.o.map((text,oi)=>{
      let cls=q.t==='single'?'opt radio locked':'opt check locked'; let mark='';
      const correct=q.c.includes(oi), chosen=sel.includes(oi);
      if(correct && chosen){ cls+=' correct'; mark='✓'; }
      else if(correct && !chosen){ cls+=' miss'; mark=''; }
      else if(!correct && chosen){ cls+=' wrong'; mark='✕'; }
      return `<div class="${cls}"><span class="mark">${mark}</span><span><span class="lt">${letters[oi]}.</span> ${safeHTML(text)}</span></div>`;
    }).join("");
    const verdict = ok?`<div class="verdict v-right">✓ Correct</div>`:`<div class="verdict v-wrong">✕ Incorrect</div>`;
    return `<div class="reviewcard">
      <div class="qmeta">
        <span class="chip chip-num mono">Q${i+1}</span>
        <span class="chip chip-dom">${safeHTML(dom.name)}</span>
        ${q.t==='multi'?'<span class="chip chip-multi">Multi-select</span>':''}
        ${scenario?'<span class="chip chip-scn">Scenario</span>':''}
      </div>
      ${scn}
      <div class="stem" style="font-size:18px">${safeHTML(q.q)}</div>
      <div class="opts" style="margin-top:14px">${opts}</div>
      <div class="explain">${verdict}<div class="ekey">Why</div><p>${safeHTML(q.e)}</p></div>
    </div>`;
  }).join("");
}
function restart(){ clearSession(); state.screen="start"; state.reviewFilter="all"; renderStart(); window.scrollTo(0,0); }
function goHome(){
  const activeExam = state.screen==='exam' && !state.submitted;
  if(activeExam && !confirm('Return to the home screen? Your current exam progress will be lost.')) return;
  if(state.timer){clearInterval(state.timer); state.timer=null;}
  clearSession();
  state.screen='start'; state.reviewFilter='all'; renderStart(); window.scrollTo(0,0);
}

/* boot */
boot();
</script>
</body>
</html>
